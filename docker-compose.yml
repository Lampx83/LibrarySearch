# LibrarySearch - Deploy standalone (Portainer / docker-compose)
# Frontend (nginx): cổng 8019. Backend (API): cổng 8020 (AI Portal gọi trực tiếp).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - LIBRARY_DATA_DIR=${LIBRARY_DATA_DIR:-/data}
    volumes:
      - library-data:/data
    ports:
      - "${BACKEND_PORT:-8020}:8001"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HTTP_PORT:-8019}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  library-data:

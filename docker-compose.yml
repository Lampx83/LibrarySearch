# LibrarySearch - Deploy standalone (Portainer / docker-compose)
# Frontend: 8019. Backend: 8020. Dữ liệu Excel/CSV nhúng trong image (backend/data → /data).
# Muốn dùng dữ liệu khác: bỏ comment volumes và mount thư mục host.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - LIBRARY_DATA_DIR=/data
    # volumes:
    #   - library-data:/data
    ports:
      - "${BACKEND_PORT:-8020}:8001"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HTTP_PORT:-8018}:80"
    depends_on:
      - backend
    restart: unless-stopped

